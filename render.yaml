services:
  - type: web
    name: personal-finance-tracker
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRATION
        value: 7d
      - key: DATABASE_URL
        sync: false # Set manually from Neon dashboard
